name: PR Template

on:
  pull_request:
    types: [opened, reopened]
    branches: [main, staging, development]

jobs:
  add-template:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Add template and Jira link to PR
        uses: actions/github-script@v7
        env:
          JIRA_AUTH: ${{ secrets.JIRA_AUTH }}
          JIRA_RELEASE_NAME: ${{ vars.JIRA_RELEASE_NAME }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const currentBody = context.payload.pull_request.body || '';
            const prNumber = context.issue.number;
            const author = context.payload.pull_request.user.login;

            console.log(`Branch: ${branchName}`);

            const baseBranch = context.payload.pull_request.base.ref;
            const allowed = {
              main: 'staging',
              staging: 'development',
              development: null
            };
            const requiredSource = allowed[baseBranch];
            if (requiredSource && branchName !== requiredSource) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `> **Warning**\n> This PR targets \`${baseBranch}\` but only \`${requiredSource}\` can merge into \`${baseBranch}\`.\n> **Flow:** \`development\` → \`staging\` → \`main\`\n> Please change the base branch.`
              });
            }

            if (currentBody.includes('## Issue')) {
              console.log('Template already present, skipping');
              return;
            }

            const capitalize = s => s.replace(/\b\w/g, c => c.toUpperCase());
            const keyMatch = branchName.match(/^(AR-\d+)-(.*)/);
            let prTitle = capitalize(branchName.replace(/-/g, ' '));
            if (keyMatch) {
              const rest = keyMatch[2];
              const suffix = rest.match(/-(\d+)$/);
              const body = (suffix ? rest.slice(0, -suffix[0].length) : rest).replace(/-/g, ' ');
              const capitalized = capitalize(body);
              prTitle = suffix ? `${keyMatch[1]} ${capitalized}-${suffix[1]}` : `${keyMatch[1]} ${capitalized}`;
            }

            const match = branchName.match(/(AR-\d+)/);
            let jiraSection = '';
            if (match) {
              const jiraKey = match[1];
              const jiraUrl = `https://arduron.atlassian.net/browse/${jiraKey}`;

              let ticketTitle = '';
              const jiraAuth = process.env.JIRA_AUTH;
              if (jiraAuth) {
                try {
                  const res = await fetch(
                    `https://arduron.atlassian.net/rest/api/3/issue/${jiraKey}?fields=summary`,
                    { headers: { Authorization: `Basic ${jiraAuth}`, Accept: 'application/json' } }
                  );
                  if (res.ok) {
                    const data = await res.json();
                    ticketTitle = data.fields.summary;
                  }

                  const ghUser = await github.rest.users.getByUsername({ username: author });
                  const email = ghUser.data.email;
                  if (email) {
                    const users = await fetch(
                      `https://arduron.atlassian.net/rest/api/3/user/search?query=${email}`,
                      { headers: { Authorization: `Basic ${jiraAuth}`, Accept: 'application/json' } }
                    );
                    if (users.ok) {
                      const found = await users.json();
                      if (found.length > 0) {
                        await fetch(
                          `https://arduron.atlassian.net/rest/api/3/issue/${jiraKey}/assignee`,
                          {
                            method: 'PUT',
                            headers: { Authorization: `Basic ${jiraAuth}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ accountId: found[0].accountId })
                          }
                        );
                      }
                    }
                  }
                } catch (e) {
                  console.log(`Jira API error: ${e.message}`);
                }
              }

              jiraSection = ticketTitle
                ? `[${jiraKey} - ${ticketTitle}](${jiraUrl})`
                : `[${jiraKey}](${jiraUrl})`;

              if (jiraAuth) {
                try {
                  const vRes = await fetch(
                    'https://arduron.atlassian.net/rest/api/3/project/AR/versions',
                    { headers: { Authorization: `Basic ${jiraAuth}`, Accept: 'application/json' } }
                  );
                  if (vRes.ok) {
                    const versions = await vRes.json();
                    const repoName = context.repo.repo;
                    // Try variable first, then find by repo name
                    let rel = process.env.JIRA_RELEASE_NAME
                      ? versions.find(v => v.name === process.env.JIRA_RELEASE_NAME)
                      : null;
                    if (!rel) {
                      rel = versions
                        .filter(v => !v.released && v.name.toLowerCase().includes(repoName.toLowerCase()))
                        .sort((a, b) => (a.releaseDate || '9999').localeCompare(b.releaseDate || '9999'))[0];
                    }
                    if (rel) {
                      const relUrl = `https://arduron.atlassian.net/projects/AR/versions/${rel.id}`;
                      jiraSection += `\n**Release:** [${rel.name}](${relUrl}) — ${rel.releaseDate || 'TBD'}`;
                    }
                  }
                } catch (e) {
                  console.log(`Release lookup error: ${e.message}`);
                }
              }
            }

            const newBody = [
              jiraSection,
              '',
              '## What was done',
              currentBody,
              '',
              '## What to expect',
              '',
              '- [ ] ',
              '- [ ] ',
              '- [ ] ',
              '',
              '## Tickets',
              '- [ ] DEV:',
              '- [ ] Frontend:',
              '- [ ] QA (if applicable):'
            ].join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              title: prTitle,
              body: newBody
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              assignees: [author]
            });

            console.log('Template and Jira link added');
