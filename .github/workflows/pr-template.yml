name: PR Template

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  add-template:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Add template and Jira link to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const currentBody = context.payload.pull_request.body || '';
            const prNumber = context.issue.number;
            const author = context.payload.pull_request.user.login;

            console.log(`Branch: ${branchName}`);

            if (currentBody.includes('## Issue')) {
              console.log('Template already present, skipping');
              return;
            }

            const match = branchName.match(/((?:SP|AR)-\d+)/);
            let jiraLine = '';
            if (match) {
              const jiraKey = match[1];
              const jiraUrl = `https://arduron.atlassian.net/browse/${jiraKey}`;
              jiraLine = `<a href="${jiraUrl}" target="_blank">${jiraKey}</a>`;
              console.log(`Found Jira ticket: ${jiraKey}`);
            }

            const issueLine = jiraLine ? `## Issue ${jiraLine}` : '## Issue';

            const newBody = [
              issueLine,
              '',
              '## What was done',
              currentBody,
              '',
              '## What to expect',
              '',
              '- [ ] ',
              '- [ ] ',
              '- [ ] ',
              '',
              '## Tickets',
              '- [ ] DEV:',
              '- [ ] Frontend:',
              '- [ ] QA (if applicable):'
            ].join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: newBody
            });

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              assignees: [author]
            });

            console.log('Template and Jira link added');
