name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Jira keys
        id: jira
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const keys = new Set();
            for (const c of commits) {
              const m = c.message.match(/AR-\d+/g) || [];
              m.forEach(k => keys.add(k));
            }
            const jiraKeys = [...keys].join(',') || 'no-ticket';
            core.setOutput('keys', jiraKeys);
            console.log(`Jira keys: ${jiraKeys}`);

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Track deployment for Jira
        uses: chrnorm/deployment-action@v2
        id: jira-deploy
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          description: "Production deploy ${{ steps.jira.outputs.keys }}"

      - name: Update Jira deployment status
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          state: success
          deployment-id: ${{ steps.jira-deploy.outputs.deployment_id }}
          environment-url: https://fdilonev.github.io/test/

      - name: Get latest tag
        id: latest-tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Bump version and create release
        if: steps.latest-tag.outputs.tag != ''
        uses: actions/github-script@v7
        with:
          script: |
            const latestTag = '${{ steps.latest-tag.outputs.tag }}';
            const parts = latestTag.replace('v','').split('.').map(Number);
            parts[2] += 1;
            const newTag = `v${parts.join('.')}`;

            const { data: commits } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: latestTag,
              head: 'main'
            });

            const lines = commits.commits.map(c => {
              const msg = c.commit.message.split('\n')[0];
              const jira = msg.match(/AR-\d+/g) || [];
              const link = jira.map(k =>
                `[${k}](https://arduron.atlassian.net/browse/${k})`
              ).join(' ');
              return `- ${msg} ${link}`;
            });

            const body = [
              `## Cambios desde ${latestTag}`,
              '',
              ...lines,
              '',
              `**Jira keys:** ${{ steps.jira.outputs.keys }}`,
              `**Deploy:** https://fdilonev.github.io/test/`
            ].join('\n');

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${newTag}`,
              sha: context.sha
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: newTag,
              name: `Release ${newTag}`,
              body: body,
              draft: false,
              prerelease: false
            });

            console.log(`Created release ${newTag}`);
