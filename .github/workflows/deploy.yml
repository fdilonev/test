name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Jira key from commits
        id: jira
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const keys = new Set();
            const pattern = /(?:SP|AR)-\d+/g;

            for (const commit of commits) {
              const matches = commit.message.match(pattern) || [];
              matches.forEach(k => keys.add(k));
            }

            if (keys.size === 0) {
              const headMsg = context.payload.head_commit?.message || '';
              const branchMatches = headMsg.match(pattern) || [];
              branchMatches.forEach(k => keys.add(k));
            }

            const jiraKeys = [...keys].join(',');
            const firstKey = [...keys][0] || '';
            const envUrl = firstKey
              ? `https://arduron.atlassian.net/browse/${firstKey}`
              : '';

            core.setOutput('keys', jiraKeys);
            core.setOutput('found', keys.size > 0 ? 'true' : 'false');
            core.setOutput('env-url', envUrl);
            console.log(`Jira keys: ${jiraKeys || 'none'}`);

      - name: Create GitHub Deployment
        if: steps.jira.outputs.found == 'true'
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          description: "Deploy ${{ steps.jira.outputs.keys }}"

      - name: Deploy
        if: steps.jira.outputs.found == 'true'
        run: echo "Deploying ${{ steps.jira.outputs.keys }}..."

      - name: Update Deployment Status (success)
        if: success() && steps.jira.outputs.found == 'true'
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          state: success
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          environment-url: ${{ steps.jira.outputs.env-url }}

      - name: Update Deployment Status (failure)
        if: failure() && steps.jira.outputs.found == 'true'
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          state: failure
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
