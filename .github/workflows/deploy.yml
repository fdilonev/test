name: Deploy Development

on:
  push:
    branches: [development]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      contents: read
    environment:
      name: development
      url: https://github.com/fdilonev/test/tree/development

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Jira keys
        id: jira
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.commits || [];
            const keys = new Set();
            for (const c of commits) {
              const m = c.message.match(/AR-\d+/g) || [];
              m.forEach(k => keys.add(k));
            }
            const jiraKeys = [...keys].join(',') || 'no-ticket';
            core.setOutput('keys', jiraKeys);
            console.log(`Jira keys: ${jiraKeys}`);

      - name: Create Deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: development
          description: "Dev deploy ${{ steps.jira.outputs.keys }}"

      - name: Run dev checks
        run: |
          echo "Running development checks..."
          echo "Validating HTML structure..."
          test -f index.html && echo "✓ index.html exists"
          test -d css && echo "✓ CSS directory exists"
          test -d js && echo "✓ JS directory exists"
          echo "Development deploy complete"

      - name: Update status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          state: success
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Update status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          state: failure
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
